    <rect x="56" y="232" width="400" height="10" fill="#ffffff"/>
    <rect x="56" y="344" width="400" height="10" fill="#ffffff"/>
  </g>

  <!-- terminal prompt mark: ">_" -->
  <g filter="url(#glow)" fill="none" stroke="url(#g)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M156 180 L256 256 L156 332" stroke-width="26"/>
    <path d="M272 332 H360" stroke-width="22"/>
  </g>

  <g stroke="url(#g)" stroke-width="6" stroke-linecap="round" opacity="0.85">
    <path d="M96 120h40" />
    <path d="M96 120v40" />
    <path d="M416 120h-40" />
    <path d="M416 120v40" />
    <path d="M96 392h40" />
    <path d="M96 392v-40" />
